<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Landing Page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; }
        header { background: #1a1a2e; color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 100px 5%; text-align: center; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero p { font-size: 1.2rem; opacity: 0.9; max-width: 600px; margin: 0 auto 2rem; }
        .btn { background: #e94560; color: white; padding: 1rem 2rem; text-decoration: none; border-radius: 5px; display: inline-block; }
        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <header>
        <div class="logo">MyBrand</div>
        <nav>
            <a href="#" style="color: white; text-decoration: none; margin-left: 20px;">Home</a>
            <a href="#" style="color: white; text-decoration: none; margin-left: 20px;">About</a>
            <a href="#" style="color: white; text-decoration: none; margin-left: 20px;">Contact</a>
        </nav>
    </header>
    <section class="hero">
        <h1>Build Something Amazing</h1>
        <p>Create beautiful landing pages that convert visitors into customers.</p>
        <a href="#" class="btn">Get Started</a>
    </section>
</body>
</html>
